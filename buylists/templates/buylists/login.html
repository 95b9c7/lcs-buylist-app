{% extends "buylists/base.html" %}

{% block title %}Login — LCS Buylist{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">Staff Login</h1>

                {% if form.errors %}
                <div class="alert alert-danger">
                    Invalid username or password. Please try again.
                </div>
                {% endif %}

                <form method="post" action="{% url 'buylists:login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            id="id_username"
                            required
                            autofocus
                        >
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            id="id_password"
                            required
                        >
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Log in</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
