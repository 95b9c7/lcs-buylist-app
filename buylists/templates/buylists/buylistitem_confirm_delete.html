{% extends "buylists/base.html" %}

{% block title %}Delete Card — LCS Buylist{% endblock %}

{% block content %}
<h1 class="h2 mb-4">Delete Card?</h1>

<p>Remove <strong>{{ item.card_name }}</strong> from {{ buylist.customer.name }}'s buylist?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'buylists:buylist_detail' pk=buylist.pk %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
